<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marco Makawejew â€” Portfolio</title>
  <style>
    :root{--bg:#0b0f14;--text:#e8ecf1;--muted:#9aa4af;--a:#7c5cff;--b:#00e0b8;--sel-c1:#7C5CFF;--sel-c2:#00E0B8;--sel-c3:#FFFFFF;--glass-blur: 18px;--glass-saturate: 170%;--glass-bright: 1.18; --glass-tint: .08;}
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;overflow:hidden;background:var(--bg);color:var(--text);font:500 14px/1.55 Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif}

    /* ====== LAYOUT: Flower left, Project right ====== */
    .stage{position:fixed;inset:0;display:grid;grid-template-columns:min(46vw,720px) 1fr;align-items:center}
    .left{position:relative;height:100%;display:grid;place-items:center}
    .right{position:relative;height:100%;display:grid;grid-template-rows:auto auto auto 1fr;align-content:center;gap:10px;padding-right:5vw}

    .bg::before{content:"";position:fixed;inset:-20vmax;z-index:-2;pointer-events:none;
      background:
        radial-gradient(60vmax 40vmax at 10% 90%, rgba(124,92,255,.18), transparent 60%),
        radial-gradient(50vmax 35vmax at 90% 10%, rgba(0,224,184,.16), transparent 60%),
        conic-gradient(from 90deg at 50% 50%, rgba(255,255,255,.03), transparent 30%);
      filter: saturate(110%)}

    /* Header / Nav */
    .brand{position:fixed;left:2.8vw;top:3.4vh;display:flex;gap:12px;align-items:baseline}
    .brand h1{margin:0;font-weight:800;letter-spacing:.2px}
    .brand .tag{color:var(--muted)}
    .nav{position:fixed;right:3vw;top:3.2vh;display:flex;gap:14px;align-items:center}
    .nav a{color:var(--muted);text-decoration:none}
    .nav a:hover{color:var(--text)}

    /* ====== Flower Orbit (left) ====== */
    .orbit{--angle:0deg;--R:clamp(260px,38vmin,520px);position:relative;width:100%;height:100%;display:grid;place-items:center}
    .ring{position:absolute;inset:0;display:grid;place-items:center}

    .node{--theta:0deg;--r:300px;--s:1;--offset:0px;position:absolute;left:50%;top:50%;
      transform:
        rotate(calc(var(--theta) + var(--angle)))
        translate(calc(var(--r) + var(--offset)))
        rotate(calc(-1 * (var(--theta) + var(--angle))));
      transition:transform 1s cubic-bezier(.25,.9,.1,1), filter .45s, opacity .45s;
      filter:drop-shadow(0 10px 30px rgba(0,0,0,.45));
      appearance:none;-webkit-appearance:none;background:transparent;border:0;padding:0;outline:none;
      pointer-events:auto;
    }
    /* bring hovered/active above neighbors so itâ€™s always clickable */
    .node:hover{z-index:60000}
    .node.active{
      z-index:65000;
      --offset: calc((var(--R) - var(--r)) + clamp(18px, 8vmin, 140px));
    }

    .blob{
      /* -- geometry (keep!) -- */
      --size:clamp(88px,16vmin,200px);
      --g:1;
      width:calc(var(--size)*var(--s));
      aspect-ratio:1/1;
      border-radius:50%;
      position:relative;
      overflow:hidden;
      cursor:pointer;
      will-change:transform, filter, backdrop-filter;
      transform:scaleX(1.25) scaleY(0.82) scale(var(--g));
      transition:transform .45s ease, box-shadow .45s ease, filter .3s ease;

      /* -- glassiness (your new look) -- */
      backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate)) brightness(var(--glass-bright));
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate)) brightness(var(--glass-bright));
      background:
        linear-gradient(var(--grad,135deg),
          color-mix(in srgb, var(--c1) 24%, transparent) 0%,
          color-mix(in srgb, var(--c2) 24%, transparent) 100%),
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.02)),
        rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.28);
      box-shadow:
        0 14px 42px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.35),
        inset 0 -12px 22px rgba(0,0,0,.22),
        inset 0 0 0 0.5px rgba(255,255,255,.22);
    }

    /* Specular highlight + animated glare sweep */
    .blob::before{
      content:"";
      position:absolute; inset:0; border-radius:inherit; pointer-events:none;
      background:
        linear-gradient(115deg,
          rgba(255,255,255,0) 40%,
          rgba(255,255,255,.55) 50%,
          rgba(255,255,255,0) 60%) no-repeat,
        radial-gradient(120% 140% at 25% 22%,
          rgba(255,255,255,.38),
          rgba(255,255,255,.08) 35%,
          rgba(255,255,255,.02) 55%,
          transparent 60%) no-repeat;
      background-size: 280% 280%, 100% 100%;
      background-position: -140% -140%, center;
      mix-blend-mode: screen;
      opacity:.95;
      transition: opacity .2s ease;
      animation: blob-glint 4s ease-in-out infinite paused;
    }

    /* Internal refractions + image sheen */
    .blob::after{
      content:"";
      position:absolute; inset:-18% -22%; border-radius:inherit; pointer-events:none;
      background:
        conic-gradient(from 180deg at 50% 50%,
          rgba(255,255,255,.10),
          rgba(255,255,255,0) 25% 75%,
          rgba(255,255,255,.10) 100%),
        radial-gradient(36% 60% at 65% 72%, rgba(255,255,255,.10), rgba(255,255,255,0)),
        var(--img) center/cover no-repeat;
      mix-blend-mode: overlay;
      opacity:.32;
    }

    /* Interactions (you already had these) */
    .node:hover .blob{ filter:saturate(120%) contrast(1.06); }
    .node:hover .blob::before{ animation-play-state: running; }
    .node.active .blob{
      filter:saturate(125%) contrast(1.08);
      box-shadow:
        0 18px 60px rgba(0,0,0,.52),
        0 0 0 2px color-mix(in srgb, var(--c1) 58%, transparent),
        inset 0 1px 0 rgba(255,255,255,.36),
        inset 0 -12px 26px rgba(0,0,0,.24);
    }
    .node.active .blob::before{ animation-play-state: running; }

    @keyframes blob-glint{
      0%   { background-position: -140% -140%, center; }
      48%  { background-position:  0%    0%,   center; }
      100% { background-position:  160%  160%, center; }
    }
    /* onâ€‘petal caption (always upright + readable) */
    .cap{position:absolute;left:50%;bottom:8%;translate:-50% 0;display:flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(6px);font-weight:800;font-size:12px;letter-spacing:.2px;color:var(--text);box-shadow:0 6px 18px rgba(0,0,0,.35);pointer-events:none;transform:translate(-50%,0) rotate(calc(-1 * (var(--theta) + var(--angle))));opacity:0;transition:opacity .18s ease, transform .2s ease;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .node:hover .cap,.node.active .cap{opacity:1}
    .cap .index{opacity:.75;font-weight:700;font-size:11px}

    /* legacy outside label now off & inert */
    .label{display:none;pointer-events:none}

    .core{position:absolute;left:50%;top:50%;translate:-50% -50%;
      width:clamp(80px,16vmin,200px);height:clamp(80px,16vmin,200px);border-radius:50%;pointer-events:none;
      background:radial-gradient(circle at 50% 50%, rgba(255,255,255,.12), rgba(124,92,255,.22) 45%, rgba(0,0,0,0) 70%);
      filter:blur(2px);opacity:.7}
    .petal{transform:rotate(calc(var(--theta) + var(--angle)));transform-origin:50% 50%;pointer-events:none}

    /* ====== Project Detail (right) ====== */
    .viewer{justify-self:center;align-self:end;width:min(58vmin,560px);aspect-ratio:1/1;border-radius:42% 48% 44% 50% / 48% 42% 56% 44%;
      position:relative;overflow:hidden;transform:translateY(8px) scale(.98);transition:transform .6s cubic-bezier(.18,.9,.2,1), box-shadow .6s, filter .6s;
      box-shadow:0 30px 90px rgba(0,0,0,.5), 0 0 0 10px rgba(255,255,255,.06) inset;
      background:
        radial-gradient(140% 140% at 20% 20%, color-mix(in srgb, var(--sel-c3) 25%, transparent) 0%, transparent 60%),
        linear-gradient(135deg, color-mix(in srgb, var(--sel-c1) 85%, #000 10%), color-mix(in srgb, var(--sel-c2) 85%, #000 10%));
      background-blend-mode:screen}
    .viewer::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:2px;background:conic-gradient(from 0deg,var(--sel-c1),var(--sel-c2),var(--sel-c1));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.35}
    .viewer::after{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient( to bottom, rgba(255,255,255,.16), rgba(255,255,255,0) 30% );mix-blend-mode:screen;pointer-events:none}
    .viewer.active{transform:translateY(0) scale(1);box-shadow:0 40px 120px rgba(0,0,0,.55)}
    .viewer .media{position:absolute;inset:0;border-radius:inherit;background:var(--hero) center/cover no-repeat;mix-blend-mode:multiply;opacity:.96;transition:opacity .5s}
    .viewer video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:inherit;filter:contrast(1.06) saturate(1.05);mix-blend-mode:multiply}
    /* Hide outer title/desc/actions when a style renders them inside the viewer */
    #detail.inline-meta .d-title,
    #detail.inline-meta .d-desc,
    #detail.inline-meta .d-actions{ display:none }

    /* ----- style variants ------ */
    /* keep your existing .viewer base as-is and add the variants below */

    .viewer.style-frame{
      border-radius:24px;
      background:rgba(255,255,255,.04);
      box-shadow:0 24px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.12) inset;
    }
    .viewer.style-frame::before,.viewer.style-frame::after{ display:none }
    .viewer.style-frame .media{ mix-blend-mode:normal; filter:contrast(1.02) saturate(1.02) }

    /* full-bleed poster with on-media caption */
    .viewer.style-poster{
      border-radius:18px; background:#000; box-shadow:0 28px 90px rgba(0,0,0,.6);
    }
    .viewer.style-poster::before,.viewer.style-poster::after{ display:none }
    .viewer.style-poster .media{ mix-blend-mode:normal; opacity:1 }
    .viewer.style-poster .ov{
      position:absolute; inset:auto 0 0 0; padding:14px 16px 16px;
      background:linear-gradient(to top, rgba(0,0,0,.62), rgba(0,0,0,0));
      color:#fff;
    }
    .viewer.style-poster .ov .t{ font-weight:900; font-size:clamp(16px,2.2vw,24px); letter-spacing:.3px }
    .viewer.style-poster .ov .s{ margin-top:4px; color:rgba(255,255,255,.85); font-size:13px }
    .viewer.style-poster .ov .btns{ display:flex; gap:10px; margin-top:8px }
    .viewer.style-poster .ov .btns a{ border:1px solid rgba(255,255,255,.4); background:rgba(255,255,255,.08) }

    /* browser-like window with chrome bar */
    .viewer.style-window{
      border-radius:12px; background:rgba(18,22,28,.9);
      box-shadow:0 22px 70px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.08) inset;
    }
    .viewer.style-window::after{ display:none }
    .viewer.style-window .chrome{
      position:absolute; left:0; right:0; top:0; height:32px; display:flex; align-items:center; gap:8px;
      padding:0 10px;
      background:linear-gradient(to bottom, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .viewer.style-window .dot{
      width:10px;height:10px;border-radius:50%;background:#ff5f57;
      box-shadow:16px 0 0 #febc2e, 32px 0 0 #28c840; opacity:.85;
    }
    .viewer.style-window .title{ margin-left:10px; font-weight:700; font-size:12px; color:var(--muted) }
    .viewer.style-window .media{ top:32px; height:calc(100% - 32px); position:absolute; left:0; right:0 }

    /* phone-ish frame */
    .viewer.style-phone{
      aspect-ratio:9/19.5; border-radius:34px; background:#000;
      box-shadow:0 30px 90px rgba(0,0,0,.6), 0 0 0 10px rgba(255,255,255,.06) inset;
    }
    .viewer.style-phone::before,.viewer.style-phone::after{ display:none }
    .viewer.style-phone .notch{
      position:absolute; top:8px; left:50%; transform:translateX(-50%);
      width:36%; height:22px; background:rgba(0,0,0,.8); border-radius:14px;
      box-shadow:0 1px 0 rgba(255,255,255,.12) inset;
    }
    .viewer.style-phone .media{ mix-blend-mode:normal; opacity:1 }
    .d-title{justify-self:center;align-self:start;margin-top:14px;font-weight:900;font-size:clamp(18px,2.8vw,32px);letter-spacing:.3px;text-align:center}
    .d-desc{justify-self:center;max-width:min(64ch,70%);text-align:center;color:var(--muted)}
    .d-actions{justify-self:center;display:flex;gap:12px;margin-top:6px}
    .d-actions a{display:inline-flex;align-items:center;gap:8px;appearance:none;border:1px solid rgba(255,255,255,.22);padding:8px 14px;border-radius:999px;text-decoration:none;color:var(--text);font-weight:800;background:rgba(255,255,255,.06);backdrop-filter:blur(6px)}

    /* Dock & Skills */
    .dock{position:fixed;left:50%;bottom:3vh;transform:translateX(-50%);
      display:flex;gap:10px;align-items:center;max-width:86vw;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;
      padding:8px 12px;border-radius:999px;background:rgba(0,0,0,.18);backdrop-filter:blur(8px) saturate(120%);border:1px solid rgba(255,255,255,.10)}
    .dock::-webkit-scrollbar{display:none}
    .dock-item{width:36px;height:36px;border-radius:50%;flex:0 0 auto;cursor:pointer;opacity:.78;transition:opacity .15s, transform .15s, box-shadow .15s;border:1px solid rgba(255,255,255,.18);
      background:var(--img) center/cover no-repeat}
    .dock-item:hover{opacity:1;transform:translateY(-1px)}
    .dock-item.active{opacity:1;box-shadow:0 0 0 2px var(--a), 0 8px 24px rgba(0,0,0,.35);border-color:rgba(255,255,255,.35)}

    .skills{position:fixed;left:2.8vw;bottom:3.2vh;display:flex;gap:12px;align-items:center}
    .skills .caption{color:var(--muted);font-size:12px;margin-right:6px}
    .skills img{height:22px;width:auto;opacity:.85;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));transition:transform .15s, opacity .15s}
    .skills img:hover{opacity:1;transform:translateY(-1px)}

    @media (max-width:980px){
      .stage{grid-template-columns:1fr}
      .right{padding:0 8vw}
      .dock{bottom:2vh}
    }

    /* Hover preview card */
    .hover-preview{position:fixed;inset:auto;left:0;top:0;transform:translate(-50%,-50%) scale(.92);opacity:0;pointer-events:none;z-index:60;transition:opacity .18s ease, transform .2s ease}
    .hover-preview.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
    .hp-media{width:220px;aspect-ratio:1/1;border-radius:28% 42% 38% 45% / 42% 38% 52% 44%;background:var(--hp) center/cover no-repeat;box-shadow:0 20px 70px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.08) inset;position:relative;overflow:hidden}
    .hp-media::before{content:"";position:absolute;inset:0;background:radial-gradient(120% 120% at 20% 20%, rgba(255,255,255,.14), transparent 60%);mix-blend-mode:screen}
    .hp-media::after{content:"";position:absolute;left:0;right:0;bottom:0;height:44%;background:linear-gradient(to top, rgba(0,0,0,.62), rgba(0,0,0,0));pointer-events:none}
    .hp-label{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);padding:6px 10px;border-radius:999px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.2);font-weight:800;white-space:nowrap}
    .hp-desc{margin-top:8px;text-align:center;font-size:12px;color:var(--muted);max-width:240px}
  </style>
</head>
<body class="bg">

  <!-- Skills -->

    <img src="assets/skills/js.svg" alt="JavaScript" title="JavaScript">
    <img src="assets/skills/html5.svg" alt="HTML5" title="HTML5">
    <img src="assets/skills/css3.svg" alt="CSS3" title="CSS3">
    <img src="assets/skills/php.svg" alt="PHP" title="PHP">
    <img src="assets/skills/react.svg" alt="React" title="React">

  </div>

  <script>
  (()=>{
    const $=(q,el=document)=>el.querySelector(q);const $$=(q,el=document)=>[...el.querySelectorAll(q)];
    const orbit=$('#orbit');const ring=$('#ring');
    const dHero=$('#dHero'), dMedia=$('#dMedia'), dTitle=$('#dTitle'), dDesc=$('#dDesc'), dActions=$('#dActions');
    const dock=$('#dock');
    const hoverPreview=$('#hoverPreview'), hpMedia=$('#hpMedia'), hpLabel=$('#hpLabel'), hpDesc=$('#hpDesc');

    // === Hover preview (readable, image-based) ===
    function showPreview(i,p){
      hpLabel.textContent=p.title; hpDesc.textContent=p.desc; hpMedia.style.setProperty('--hp', `url('${p.img}')`);
      const rect=orbit.getBoundingClientRect(); const cx=rect.left + rect.width/2; const cy=rect.top + rect.height/2;
      const ang=(thetaList[i] + angleAcc) * Math.PI/180; const r=(rList[i]||0) + 36; // a bit outside
      let x=cx + Math.cos(ang)*r; let y=cy + Math.sin(ang)*r;
      const vw=innerWidth, vh=innerHeight; const w=240, h=260; const pad=12;
      x=Math.min(vw - w/2 - pad, Math.max(w/2 + pad, x));
      y=Math.min(vh - h/2 - pad, Math.max(h/2 + pad, y));
      hoverPreview.style.left=x+'px'; hoverPreview.style.top=y+'px';
      hoverPreview.classList.add('show');
    }
    function hidePreview(){ hoverPreview.classList.remove('show'); }

    function setInlineMeta(on){
      const detail = document.getElementById('detail');
      detail.classList.toggle('inline-meta', !!on);
    }
    function applyViewerStyle(style, p){
      // clear extras
      $$('.chrome,.ov,.notch', dHero).forEach(el=>el.remove());
      dHero.className = 'viewer style-' + style;
      dHero.dataset.title = p.title || '';

      // add style-specific chrome/overlays
      if(style==='window'){
        const bar = document.createElement('div'); bar.className='chrome';
        const dots = document.createElement('div'); dots.className='dot';
        const ttl = document.createElement('div'); ttl.className='title'; ttl.textContent = p.title;
        bar.appendChild(dots); bar.appendChild(ttl); dHero.appendChild(bar);
        setInlineMeta(true);
      }else if(style==='poster'){
        const ov = document.createElement('div'); ov.className='ov';
        ov.innerHTML = `<div class="t">${p.title}</div>
                        <div class="s">${p.desc||''}</div>
                        <div class="btns"></div>`;
        const btns = ov.querySelector('.btns');
        if(p.live){ const a=document.createElement('a'); a.href=p.live; a.target='_blank'; a.rel='noopener'; a.textContent='Live'; btns.appendChild(a); }
        if(p.code){ const a=document.createElement('a'); a.href=p.code; a.target='_blank'; a.rel='noopener'; a.textContent='Code'; btns.appendChild(a); }
        dHero.appendChild(ov);
        setInlineMeta(true);
      }else if(style==='phone'){
        const notch = document.createElement('div'); notch.className='notch';
        dHero.appendChild(notch);
        setInlineMeta(true);
      }else{
        setInlineMeta(false); // 'blob' (default) or 'frame'
      }
    }
    // === Projekte (Beispiel) ===
    const projects=[
      {title:'Markets Board',desc:'Realtime Dashboard â€¦',img:'assets/marketboard.jpg',live:'https://makawejew.live',code:'https://git.makawejew.com', style:'window'},
      {title:'Marco Hub',desc:'iOS-Ă¤hnliches Kachel-Dashboard â€¦',img:'assets/hub.jpg', style:'frame'},
      {title:'Autohaus',desc:'PHP/MySQL App â€¦',img:'assets/autohaus.jpg', style:'poster'},
      {title:'Markets Mobile',desc:'Responsive Watchlist + Sparklines.',img:'assets/mobile.jpg', style:'phone'},
      {title:'Events Platform',desc:'Oneâ€‘screen Eventâ€‘Creation MVP (HTML/CSS/JS/PHP).',img:'assets/events.jpg',live:'#',code:'#'},
      {title:'Discord Suggestion Bot',desc:'Modalâ€‘Flows, Forumâ€‘Threads, DOCXâ€‘Export, Autoâ€‘Sync.',img:'assets/discord.jpg',live:'#',code:'#'},
      {title:'AI Voice Lab',desc:'Lokales TTS/VC Setup (RTX 2080 Super).',img:'assets/voice.jpg',live:'#',code:'#'},
      {title:'TrueNAS Stack',desc:'Selfâ€‘hosted Suite: Nextcloud, Gitea, WireGuard, MineOS â€¦',img:'assets/truenas.jpg',live:'#',code:'#'},
      {title:'Markets API Proxy',desc:'Rateâ€‘limited Aggregator fĂĽr Quotes & Candles.',img:'assets/api.jpg',live:'#',code:'#'},
      {title:'Portfolio Orbit',desc:'Diese abstrakte Orbitâ€‘UI, ohne Boxen.',img:'assets/orbit.jpg',live:'#',code:'#'},
      {title:'Unity FPS Controller',desc:'Sprinting, Sliding, Ledge Climb, Air Control.',img:'assets/unity.jpg',live:'#',code:'#'},
      {title:'Cloudflare Pages',desc:'Multiâ€‘Subdomain Setup mit Tunnels & DNS.',img:'assets/cloudflare.jpg',live:'#',code:'#'},
      {title:'Markets Board v2',desc:'WebSocket Toggles, EUR/USD Switch, Recharts.',img:'assets/marketboard2.jpg',live:'#',code:'#'},
      {title:'Autohaus v2',desc:'Neue Filtergruppen, Sticky Header, Price/Perf.',img:'assets/autohaus2.jpg',live:'#',code:'#'},
      {title:'Hub Folders',desc:'Dragâ€‘Hold Ordnerbildung, Quickâ€‘Access Pins.',img:'assets/folders.jpg',live:'#',code:'#'},
      {title:'Investment News AI',desc:'Newsâ€‘Aggregator mit Topicâ€‘Clustering.',img:'assets/news.jpg',live:'#',code:'#'},
      {title:'Markets Mobile',desc:'Responsive Watchlist + Sparklines.',img:'assets/mobile.jpg',live:'#',code:'#'},
      {title:'Gitea Pipelines',desc:'CI fĂĽr Codeâ€‘Server Repos.',img:'assets/gitea.jpg',live:'#',code:'#'},
      {title:'DOCX Engine',desc:'Wordâ€‘Generator mit Bildâ€‘Previews, Listen.',img:'assets/docx.jpg',live:'#',code:'#'},
      {title:'Forum Sync',desc:'Threads rehydrate + Statusâ€‘Emoji Update.',img:'assets/forum.jpg',live:'#',code:'#'},
      {title:'Orbit Shader',desc:'Noiseâ€‘Glow Experiments.',img:'assets/shader.jpg',live:'#',code:'#'},
    ];

    // Paletten (mehrfarbig)
    const palettes=[['#7C5CFF','#00E0B8'],['#FF8A5B','#FF4D97'],['#4DA1FF','#6FFFE9'],['#FFD166','#06D6A0'],['#F72585','#7209B7'],['#71EFA3','#29ABE2'],['#F97316','#F43F5E']];

    let current=0; const thetaList=[]; let angleAcc=0; const rList=[];

    // Layout: single/double/spiral
    function computeLayout(N){
      const rect=orbit.getBoundingClientRect();
      const Rmax=Math.min(rect.width, rect.height)*0.46;
      const layout = N<=12 ? 'single' : N<=24 ? 'double' : 'spiral';
      const out=[];
      if(layout==='single'){
        const step=360/N; for(let i=0;i<N;i++){ out.push({theta:i*step, r:Rmax*0.88, s:scaleForN(N)}); }
      }else if(layout==='double'){
        const outer=Math.ceil(N*0.6), inner=N-outer; const stepO=360/outer, stepI=360/inner;
        for(let i=0;i<outer;i++){ out.push({theta:i*stepO, r:Rmax*0.90, s:scaleForN(N)*0.92}); }
        for(let j=0;j<inner;j++){ out.push({theta:j*stepI + stepI/2, r:Rmax*0.62, s:scaleForN(N)*1.04}); }
      }else{ const ga=137.5; for(let k=0;k<N;k++){ const t=N>1? k/(N-1) : 0; const r=(0.30 + 0.62*t)*Rmax; const s=scaleForN(N)*(0.95 - 0.25*t); out.push({theta:k*ga, r, s}); } }
      return out;
    }
    function scaleForN(N){ return N<=8?1 : N<=12?0.95 : N<=20?0.85 : N<=28?0.78 : 0.72 }

    function mount(){
      const N=projects.length; const placements=computeLayout(N);
      ring.innerHTML=''; dock.innerHTML=''; thetaList.length=0; angleAcc=0; rList.length=0;

      projects.forEach((p,i)=>{
        const [c1,c2]=palettes[i%palettes.length]; const c3=palettes[(i+1)%palettes.length][0];
        const grad=(100 + i*37)%360 + 'deg';
        const node=document.createElement('button'); node.className='node';
        node.style.setProperty('--theta', placements[i].theta+'deg');
        node.style.setProperty('--r', placements[i].r+'px'); node.style.setProperty('--s', placements[i].s);
        // depth order: inner ring always above outer ring
        const _rect=orbit.getBoundingClientRect();
        const _Rmax=Math.min(_rect.width,_rect.height)*0.46;
        const isInner = placements[i].r < _Rmax*0.8; // threshold between inner/outer
        node.dataset.layer = isInner ? 'inner' : 'outer';
        node.style.zIndex = isInner ? 40000 : 30000;
        node.setAttribute('aria-label',p.title);
        node.innerHTML=`
          <div class="petal">
            <div class="blob" style="--img:url('${p.img}');--grad:${grad};--c1:${c1};--c2:${c2};--c3:${c3}">
              
            </div>
          </div>`;
        node.addEventListener('click',()=>{go(i); bumpViewer();});
        node.addEventListener('mouseenter',()=>showPreview(i,p));
        node.addEventListener('mouseleave',hidePreview);
        ring.appendChild(node);

        const d=document.createElement('button'); d.className='dock-item'; d.style.setProperty('--img', `url('${p.img}')`); d.dataset.title=p.title;
        d.addEventListener('mouseenter',()=>showPreview(i,p)); d.addEventListener('mouseleave',hidePreview);
        d.addEventListener('click',()=>{go(i); bumpViewer();});
        dock.appendChild(d);

        thetaList[i]=placements[i].theta; rList[i]=placements[i].r;
      });
      update(true);
      window.addEventListener('resize', remountThrottled, {passive:true});
    }

    let remountTimer=null; function remountThrottled(){ if(remountTimer) return; remountTimer=setTimeout(()=>{remountTimer=null; mount();}, 120); }

    function bumpViewer(){ dHero.classList.add('active'); setTimeout(()=>dHero.classList.remove('active'), 800); }

    function update(initial=false){
      const target = - (thetaList[current]||0);
      if(initial){ angleAcc = target; } else {
        let delta = (target - angleAcc) % 360;
        if(delta>180) delta -= 360; if(delta<-180) delta += 360; angleAcc += delta;
      }
      ring.style.setProperty('--angle', angleAcc+'deg');

      $$('.node',ring).forEach((n,i)=>n.classList.toggle('active',i===current));
      $$('.dock-item',dock).forEach((d,i)=>d.classList.toggle('active',i===current));

      const p=projects[current];
      const [c1,c2]=palettes[current%palettes.length];
      const c3=palettes[(current+1)%palettes.length][0];

      // choose a style (use p.style if set, else auto-rotate for variety)
      const style = p.style || (['window','poster','frame','blob','phone'][current % 5]);

      // outer meta (fallback or styles that keep it)
      dTitle.textContent=p.title;
      dDesc.textContent=p.desc||'';
      dActions.innerHTML='';
      if(p.live){const a=document.createElement('a');a.href=p.live;a.target='_blank';a.rel='noopener';a.textContent='Live';dActions.appendChild(a)}
      if(p.code){const a=document.createElement('a');a.href=p.code;a.target='_blank';a.rel='noopener';a.textContent='Code';dActions.appendChild(a)}

      // viewer style & media
      applyViewerStyle(style, p);
      if(p.video){
        dMedia.innerHTML = `<video src="${p.video}" autoplay muted loop playsinline></video>`;
      }else{
        dMedia.innerHTML = '';
        dHero.style.setProperty('--hero', `url('${p.img}')`);
      }

      document.documentElement.style.setProperty('--sel-c1', c1);
      document.documentElement.style.setProperty('--sel-c2', c2);
      document.documentElement.style.setProperty('--sel-c3', c3);
    }

    function go(i){current=(i+projects.length)%projects.length; update();}
    function next(){go(current+1)}; function prev(){go(current-1)}

    // Keyboard & Swipe
    window.addEventListener('keydown',e=>{
      if(e.key==='ArrowRight') next(); else if(e.key==='ArrowLeft') prev();
      else if(/^[0-9]$/.test(e.key)){ const map={'0':9,'1':0,'2':1,'3':2,'4':3,'5':4,'6':5,'7':6,'8':7,'9':8}; const idx = map[e.key]; if(idx<projects.length) go(idx); }
      else if(e.key==='Enter'){ const p=projects[current]; if(p.live) window.open(p.live,'_blank') }
    });

    // Swipe (mobil)
    let sx=0; let dx=0; window.addEventListener('touchstart',e=>{sx=e.touches[0].clientX},{passive:true});
    window.addEventListener('touchmove',e=>{dx=e.touches[0].clientX - sx},{passive:true});
    window.addEventListener('touchend',()=>{ if(Math.abs(dx)>40){ dx>0?prev():next(); } sx=dx=0; },{passive:true});

    mount();
  })();
  </script>
</body>
